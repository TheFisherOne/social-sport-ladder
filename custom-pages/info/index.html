<head>

    html, body { margin: 0; height: 100%; }

      if (window.history.length <= 1) {
        document.getElementById('backBtn').style.display = 'none';
      }
    };

<body>

  <button id="backBtn" onclick="history.back()">Go Back</button>

</body>
</html>
